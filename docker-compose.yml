services:
  # 1. THE UNIFIED DEV ENVIRONMENT (VS Code will live here)
  dev-env:
    build: 
      context: .
      dockerfile: Dockerfile # That Ubuntu one you sent
    container_name: encyclopedia-dev
    tty: true
    stdin_open: true
    volumes:
      - .:/app # Mounts everything (ui, server, and root files)
      - /app/ui/node_modules
      - /app/server/target
    environment:
      - VITE_API_URL=http://localhost:8080
      - DATABASE_URL=postgres://user:pass@db:5432/miller_db
    depends_on:
      - ui
      - server

  ui:
    build: ./ui
    container_name: encyclopedia-ui
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      server:
        condition: service_started

  server:
    build: ./server
    container_name: encyclopedia-server
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app
      - /app/target
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/miller_db
    command: cargo watch -x run
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: encyclopedia-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=miller_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d miller_db"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: