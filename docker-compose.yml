services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: miller_db
    ports:
      - "5432:5432"

  server:
    build: ./server
    volumes:
      - ./server:/app
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/miller_db
    ports:
      - "8080:8080"

  ui:
    build: ./ui
    volumes:
      - ./ui:/app
    ports:
      - "5173:5173"